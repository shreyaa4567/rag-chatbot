<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'Segoe UI',Inter,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1026"/>
      <stop offset="0.5" stop-color="#1a0b2e"/>
      <stop offset="1" stop-color="#240b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa3c7"/>
    </marker>
    <style>
      .card{fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.14);stroke-width:1.5;rx:14;}
      .title{fill:#eef1ff;font-weight:700;}
      .sub{fill:#9aa3c7;font-size:12.5px;}
      .lane{fill:rgba(255,255,255,0.03);stroke:rgba(255,255,255,0.10);stroke-dasharray:5 5;rx:16;}
      .lanelabel{fill:#cdd6ff;font-size:13px;font-weight:700;letter-spacing:1px;}
      .flow{stroke:#9aa3c7;stroke-width:2;fill:none;marker-end:url(#arrow);}
      .pill{fill:rgba(79,124,255,0.16);stroke:rgba(79,124,255,0.4);}
      .pilltxt{fill:#cdd6ff;font-size:11px;}
    </style>
  </defs>

  <rect width="1200" height="660" fill="url(#bg)"/>
  <text x="40" y="48" class="title" font-size="26">Website-Aware RAG Chatbot — Architecture</text>
  <text x="40" y="72" class="sub" font-size="13">Local, private RAG over any website · Ollama + ChromaDB + Flask</text>

  <!-- Client -->
  <rect x="40" y="100" width="220" height="120" rx="14" class="card"/>
  <text x="60" y="130" class="title" font-size="16">Frontend</text>
  <text x="60" y="154" class="sub">Static HTML / ASP.NET</text>
  <text x="60" y="174" class="sub">Glassmorphism UI · fetch()</text>
  <text x="60" y="194" class="sub">Live progress + sources</text>

  <!-- Flask API -->
  <rect x="320" y="100" width="240" height="120" rx="14" class="card"/>
  <text x="340" y="130" class="title" font-size="16">Flask API</text>
  <text x="340" y="153" class="sub">/load · /progress</text>
  <text x="340" y="171" class="sub">/chat · /health</text>
  <rect x="340" y="182" width="95" height="22" rx="11" class="pill"/>
  <text x="352" y="197" class="pilltxt">SSRF guard</text>
  <rect x="442" y="182" width="95" height="22" rx="11" class="pill"/>
  <text x="454" y="197" class="pilltxt">CORS allowlist</text>

  <!-- Ollama -->
  <rect x="980" y="100" width="180" height="120" rx="14" class="card"/>
  <text x="1000" y="130" class="title" font-size="16">Ollama</text>
  <text x="1000" y="154" class="sub">nomic-embed-text</text>
  <text x="1000" y="174" class="sub">gemma3:4b (LLM)</text>
  <text x="1000" y="196" class="sub">runs locally</text>

  <!-- client <-> api -->
  <line x1="260" y1="160" x2="318" y2="160" class="flow"/>
  <line x1="318" y1="178" x2="262" y2="178" class="flow"/>

  <!-- Ingestion lane -->
  <rect x="40" y="270" width="1120" height="150" class="lane"/>
  <text x="60" y="295" class="lanelabel">INGESTION  ·  POST /load</text>

  <rect x="70" y="312" width="200" height="86" rx="12" class="card"/>
  <text x="88" y="340" class="title" font-size="15">Crawler</text>
  <text x="88" y="361" class="sub">BFS, same-domain</text>
  <text x="88" y="379" class="sub">gzip-safe · URL-normalized</text>

  <rect x="310" y="312" width="200" height="86" rx="12" class="card"/>
  <text x="328" y="340" class="title" font-size="15">Chunker</text>
  <text x="328" y="361" class="sub">1000 / 150 overlap</text>
  <text x="328" y="379" class="sub">title prepend · dedupe</text>

  <rect x="550" y="312" width="220" height="86" rx="12" class="card"/>
  <text x="568" y="340" class="title" font-size="15">Embeddings</text>
  <text x="568" y="361" class="sub">parallel (ThreadPool)</text>
  <text x="568" y="379" class="sub">nomic-embed-text</text>

  <rect x="810" y="312" width="290" height="86" rx="12" class="card"/>
  <text x="828" y="340" class="title" font-size="15">ChromaDB (persistent)</text>
  <text x="828" y="361" class="sub">cosine space · rag_collection</text>
  <text x="828" y="379" class="sub">vectors + source metadata</text>

  <line x1="270" y1="355" x2="308" y2="355" class="flow"/>
  <line x1="510" y1="355" x2="548" y2="355" class="flow"/>
  <line x1="770" y1="355" x2="808" y2="355" class="flow"/>

  <!-- Query lane -->
  <rect x="40" y="450" width="1120" height="170" class="lane"/>
  <text x="60" y="475" class="lanelabel">QUERY  ·  POST /chat</text>

  <rect x="70" y="492" width="200" height="100" rx="12" class="card"/>
  <text x="88" y="520" class="title" font-size="15">Embed question</text>
  <text x="88" y="541" class="sub">nomic-embed-text</text>
  <text x="88" y="561" class="sub">single vector</text>

  <rect x="310" y="492" width="240" height="100" rx="12" class="card"/>
  <text x="328" y="520" class="title" font-size="15">Vector search</text>
  <text x="328" y="541" class="sub">top-k = 8 · cosine</text>
  <text x="328" y="561" class="sub">distance threshold filter</text>
  <text x="328" y="581" class="sub">empty-result guard</text>

  <rect x="590" y="492" width="220" height="100" rx="12" class="card"/>
  <text x="608" y="520" class="title" font-size="15">Prompt builder</text>
  <text x="608" y="541" class="sub">context + question</text>
  <text x="608" y="561" class="sub">grounded-only instruction</text>

  <rect x="850" y="492" width="250" height="100" rx="12" class="card"/>
  <text x="868" y="520" class="title" font-size="15">LLM answer</text>
  <text x="868" y="541" class="sub">gemma3:4b · temp 0.1</text>
  <text x="868" y="561" class="sub">answer + source URLs</text>

  <line x1="270" y1="542" x2="308" y2="542" class="flow"/>
  <line x1="550" y1="542" x2="588" y2="542" class="flow"/>
  <line x1="810" y1="542" x2="848" y2="542" class="flow"/>

  <!-- side links to chroma/ollama -->
  <path d="M955 398 C 955 430, 430 430, 430 488" class="flow"/>
  <path d="M1070 220 C 1070 260, 660 410, 660 490" class="flow" opacity="0.5"/>

  <text x="40" y="645" class="sub">Flow: Frontend → Flask → (crawl → chunk → embed → store) ; question → embed → retrieve → prompt → LLM → grounded answer.</text>
</svg>
