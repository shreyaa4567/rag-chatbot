<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website-Aware RAG Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-1: #0b1026;
            --bg-2: #1a0b2e;
            --bg-3: #240b36;
            --accent-blue: #4f7cff;
            --accent-purple: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #eef1ff;
            --text-dim: #9aa3c7;
        }

        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-main);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 420px; height: 420px;
            background: var(--accent-blue);
            top: -120px; left: -100px;
            animation: float1 14s ease-in-out infinite;
        }
        body::after {
            width: 480px; height: 480px;
            background: var(--accent-purple);
            bottom: -160px; right: -120px;
            animation: float2 16s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50%      { transform: translate(40px, 60px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50%      { transform: translate(-50px, -40px); }
        }

        .rag-wrap {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .rag-header { text-align: center; margin-bottom: 26px; }
        .rag-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 6px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .rag-header p { margin: 0; color: var(--text-dim); font-size: 0.98rem; }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            padding: 22px;
        }

        .url-row { display: flex; gap: 12px; margin-bottom: 14px; }
        .url-row input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-main);
            font-size: 0.98rem;
            outline: none;
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .url-row input::placeholder { color: var(--text-dim); }
        .url-row input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.25),
                        0 0 22px rgba(79, 124, 255, 0.45);
        }

        .btn-gradient {
            border: none;
            cursor: pointer;
            color: #fff;
            font-weight: 600;
            font-size: 0.98rem;
            padding: 14px 22px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            background-size: 180% 180%;
            transition: transform 0.18s ease, box-shadow 0.25s ease, background-position 0.5s ease;
            box-shadow: 0 6px 18px rgba(99, 80, 255, 0.4);
            white-space: nowrap;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            background-position: right center;
            box-shadow: 0 10px 26px rgba(99, 80, 255, 0.6);
        }
        .btn-gradient:active { transform: translateY(0); }
        .btn-gradient:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
        }
        .status-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #6b7280;
        }
        .status-dot.live { background: #22c55e; animation: pulse 1.8s infinite; }
        .status-dot.busy { background: #f59e0b; }
        .status-dot.error { background: #ef4444; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            70%  { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .progress-container { display: none; margin-top: 18px; }
        .progress-label { font-size: 0.88rem; color: var(--text-dim); margin-bottom: 8px; }
        .progress-bar-outer {
            width: 100%; height: 12px; border-radius: 999px;
            background: rgba(0, 0, 0, 0.3); overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%; width: 0%; border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-blue));
            background-size: 200% 100%;
            animation: slideGradient 2s linear infinite;
            transition: width 0.4s ease;
        }
        @keyframes slideGradient {
            0%   { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .chat-box {
            display: none;
            height: 440px;
            overflow-y: auto;
            scroll-behavior: smooth;
            margin-top: 18px;
            padding: 6px 4px;
        }
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15); border-radius: 999px;
        }
        .chat-box::-webkit-scrollbar-track { background: transparent; }

        .message {
            max-width: 78%;
            margin-bottom: 16px;
            padding: 13px 16px;
            line-height: 1.55;
            font-size: 0.96rem;
            border-radius: 18px;
            animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            word-wrap: break-word;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            margin-left: auto;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-bottom-right-radius: 6px;
            box-shadow: 0 6px 18px rgba(99, 80, 255, 0.35);
        }
        .bot-message {
            margin-right: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-main);
            border-bottom-left-radius: 6px;
        }

        .sources { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .sources a {
            font-size: 0.72rem;
            text-decoration: none;
            color: #cdd6ff;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(79, 124, 255, 0.18);
            border: 1px solid rgba(79, 124, 255, 0.35);
            transition: background 0.2s ease, transform 0.2s ease;
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sources a:hover { background: rgba(79, 124, 255, 0.35); transform: translateY(-1px); }

        .typing { display: inline-flex; align-items: center; gap: 5px; }
        .typing span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-dim);
            animation: blink 1.4s infinite both;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
            40%           { opacity: 1; transform: translateY(-3px); }
        }

        .input-row { display: none; gap: 12px; margin-top: 16px; }
        .input-row input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-main);
            font-size: 0.98rem;
            outline: none;
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .input-row input::placeholder { color: var(--text-dim); }
        .input-row input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.25),
                        0 0 22px rgba(168, 85, 247, 0.4);
        }

        .rag-foot {
            text-align: center;
            margin-top: 22px;
            font-size: 0.78rem;
            color: var(--text-dim);
        }
        .rag-foot code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 6px;
        }

        @media (max-width: 600px) {
            .rag-wrap { margin: 20px auto; }
            .rag-header h1 { font-size: 1.7rem; }
            .url-row, .input-row { flex-direction: column; }
            .btn-gradient { width: 100%; }
            .message { max-width: 90%; }
            .chat-box { height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="rag-wrap">
        <div class="rag-header">
            <h1>Website-Aware RAG Chatbot</h1>
            <p>Load any website, then chat with its content — answers grounded in real sources.</p>
        </div>

        <div class="glass-card">
            <div class="url-row">
                <input type="text" id="urlInput" placeholder="https://example.com" />
                <button type="button" id="loadBtn" class="btn-gradient" onclick="loadWebsite()">Load Website</button>
            </div>

            <div class="status-pill">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusLabel">No website loaded</span>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-label" id="progressLabel">Starting...</div>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progressBar"></div>
                </div>
            </div>

            <div class="chat-box" id="chatBox">
                <div class="message bot-message">
                    Hello! Load a website above, then ask me anything about it.
                </div>
            </div>

            <div class="input-row" id="inputRow">
                <input type="text" id="questionInput" placeholder="Type your question..."
                       onkeypress="handleKey(event)" />
                <button type="button" class="btn-gradient" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="rag-foot">
            Connected to API at <code id="apiLabel"></code>
        </div>
    </div>

    <script>
        // ─── CONFIGURATION ──────────────────────────────────────────
        // Point this at your Flask API. Override at runtime with ?api=<url>.
        let API_URL = "http://localhost:5000";
        const params = new URLSearchParams(location.search);
        if (params.get("api")) { API_URL = params.get("api"); }
        document.getElementById("apiLabel").textContent = API_URL;

        let progressInterval = null;

        function setStatus(state, label) {
            const dot = document.getElementById("statusDot");
            dot.className = "status-dot" + (state ? " " + state : "");
            document.getElementById("statusLabel").innerText = label;
        }

        function loadWebsite() {
            const url = document.getElementById("urlInput").value.trim();
            if (!url) { alert("Please enter a URL first."); return; }

            document.getElementById("loadBtn").disabled = true;
            document.getElementById("progressContainer").style.display = "block";
            document.getElementById("chatBox").style.display = "none";
            document.getElementById("inputRow").style.display = "none";
            setProgress(0, "Starting pipeline...");
            setStatus("busy", "Loading " + url + " ...");

            fetch(API_URL + "/load", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: url })
            }).then(r => r.json()).then(data => {
                if (data.error) {
                    setProgress(0, "Error: " + data.error);
                    setStatus("error", data.error);
                    document.getElementById("loadBtn").disabled = false;
                    return;
                }
                progressInterval = setInterval(pollProgress, 1500);
            }).catch(() => {
                setProgress(0, "Error: Could not connect to API.");
                setStatus("error", "Could not connect to API");
                document.getElementById("loadBtn").disabled = false;
            });
        }

        function pollProgress() {
            fetch(API_URL + "/progress")
                .then(r => r.json())
                .then(data => {
                    setProgress(data.percent, data.message);
                    if (data.status === "ready") {
                        clearInterval(progressInterval);
                        document.getElementById("loadBtn").disabled = false;
                        const loaded = data.url || document.getElementById("urlInput").value.trim();
                        setStatus("live", "Loaded: " + loaded);
                        setTimeout(showChat, 600);
                    }
                    if (data.status === "error") {
                        clearInterval(progressInterval);
                        document.getElementById("loadBtn").disabled = false;
                        document.getElementById("progressLabel").innerText = "Error: " + data.message;
                        setStatus("error", data.message);
                    }
                });
        }

        function setProgress(percent, message) {
            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressLabel").innerText = percent + "% — " + message;
        }

        function showChat() {
            document.getElementById("progressContainer").style.display = "none";
            document.getElementById("chatBox").style.display = "block";
            document.getElementById("inputRow").style.display = "flex";
        }

        function handleKey(event) { if (event.key === "Enter") sendMessage(); }

        function addMessage(text, isUser, sources) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = "message " + (isUser ? "user-message" : "bot-message");
            div.innerText = text;
            if (sources && sources.length > 0) {
                const srcDiv = document.createElement("div");
                srcDiv.className = "sources";
                sources.forEach(s => {
                    const a = document.createElement("a");
                    a.href = s; a.target = "_blank"; a.rel = "noopener"; a.innerText = s;
                    srcDiv.appendChild(a);
                });
                div.appendChild(srcDiv);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addThinking() {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = "message bot-message";
            div.id = "thinkingMsg";
            div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeThinking() {
            const el = document.getElementById("thinkingMsg");
            if (el) el.remove();
        }

        async function sendMessage() {
            const input = document.getElementById("questionInput");
            const question = input.value.trim();
            if (!question) return;
            addMessage(question, true);
            input.value = "";
            addThinking();
            try {
                const response = await fetch(API_URL + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                removeThinking();
                if (data.error) { addMessage("Error: " + data.error, false); }
                else { addMessage(data.answer, false, data.sources); }
            } catch (error) {
                removeThinking();
                addMessage("Error: Could not connect to API.", false);
            }
        }
    </script>
</body>
</html>
